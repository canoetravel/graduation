services:
  mysql:
    image: mysql:8.0.39
    container_name: os-judge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: os_judge
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - judge-net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: os-judge-backend
    ports:
      - "19000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=os_judge
      - AI_PLAGIARISM_PROVIDER=${AI_PLAGIARISM_PROVIDER:-ollama}
      - AI_PLAGIARISM_MODEL=${AI_PLAGIARISM_MODEL:-qwen2.5-coder:7b}
      - AI_PLAGIARISM_BASE_URL=${AI_PLAGIARISM_BASE_URL:-http://host.docker.internal:11434/api/chat}
      - AI_PLAGIARISM_API_KEY=${AI_PLAGIARISM_API_KEY:-}
      - AI_PLAGIARISM_TIMEOUT=${AI_PLAGIARISM_TIMEOUT:-90}
      - AI_FEEDBACK_PROVIDER=${AI_FEEDBACK_PROVIDER:-ollama}
      - AI_FEEDBACK_MODEL=${AI_FEEDBACK_MODEL:-qwen2.5-coder:7b}
      - AI_FEEDBACK_BASE_URL=${AI_FEEDBACK_BASE_URL:-http://host.docker.internal:11434/api/chat}
      - AI_FEEDBACK_API_KEY=${AI_FEEDBACK_API_KEY:-}
      - AI_FEEDBACK_TIMEOUT=${AI_FEEDBACK_TIMEOUT:-120}
    networks:
      - judge-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    container_name: os-judge-frontend
    ports:
      - "18080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - judge-net
    depends_on:
      - backend

networks:
  judge-net:
    driver: bridge
    name: os-judge-network

volumes:
  mysql_data:
