<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进程管理评测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .logo-icon {
            font-size: 40px;
            background: white;
            color: #667eea;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .panel-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        
        .section-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.2em;
        }
        
        /* 作业类型选择 */
        .assignment-type-selector {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        .type-option {
            flex: 1;
            text-align: center;
        }
        
        .type-radio {
            display: none;
        }
        
        .type-label {
            display: block;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .type-label:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .type-radio:checked + .type-label {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }
        
        .type-icon {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .type-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .type-desc {
            font-size: 0.9em;
            color: #666;
        }
        
        /* 设置项 */
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .setting-item input[type="number"] {
            width: 100px;
            padding: 10px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        .setting-item input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 输入方式选择器 */
        .input-method-selector {
            margin-bottom: 20px;
        }
        
        .method-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .method-btn {
            flex: 1;
            padding: 12px 20px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .method-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .method-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        /* 代码编辑器 */
        .code-editor-section {
            margin-bottom: 30px;
        }
        
        .code-editor {
            border: 2px solid #eef2ff;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .editor-header {
            background: #f8f9fa;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eef2ff;
        }
        
        .editor-actions {
            display: flex;
            gap: 10px;
        }
        
        .editor-btn {
            background: white;
            border: 1px solid #e9ecef;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .editor-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        #code {
            width: 100%;
            height: 300px;
            padding: 20px;
            border: none;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }
        
        /* 文件上传区域 */
        .file-upload-section {
            margin-bottom: 30px;
        }
        
        .upload-container {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .upload-container.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef2ff 100%);
            transform: translateY(-2px);
        }
        
        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .upload-text h4 {
            color: #333;
            margin-bottom: 8px;
        }
        
        .upload-text p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .file-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
        }
        
        .file-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        
        .file-name {
            flex: 1;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }
        
        .file-size {
            color: #666;
            font-size: 0.9em;
        }
        
        .remove-btn {
            background: none;
            border: 1px solid #f5222d;
            color: #f5222d;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .remove-btn:hover {
            background: #fff1f0;
        }
        
        .file-type-badge {
            display: inline-block;
            background: #e6f7ff;
            color: #1890ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        /* 错误提示 */
        .error-message {
            background: #fff1f0;
            border: 1px solid #ffa39e;
            color: #f5222d;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-message i {
            font-size: 1.2em;
        }
        
        /* 提交按钮 */
        .submit-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 结果区域 */
        .result-section {
            margin-top: 30px;
        }
        
        .result-container {
            border: 2px solid #eef2ff;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .result-header {
            background: #f8f9fa;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }
        
        .status-ac { background: #e6f7e6; color: #52c41a; border: 1px solid #b7eb8f; }
        .status-pa { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .status-wa { background: #fff1f0; color: #f5222d; border: 1px solid #ffa39e; }
        .status-ce { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .status-tle { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .status-se { background: #fafafa; color: #666; border: 1px solid #d9d9d9; }
        
        .result-content {
            padding: 20px;
        }
        
        .score-display {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
        }
        
        .score-value {
            color: #52c41a;
        }
        
        .max-score {
            color: #999;
        }
        
        .test-results {
            margin-top: 30px;
        }
        
        .test-result-item {
            padding: 15px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f8f9fa;
        }
        
        .test-result-item.passed {
            border-left: 4px solid #52c41a;
        }
        
        .test-result-item.failed {
            border-left: 4px solid #f5222d;
        }
        
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .test-name {
            font-weight: 600;
        }
        
        .test-score {
            font-weight: 600;
            color: #667eea;
        }
        
        .test-message {
            color: #666;
            font-size: 0.9em;
        }
        
        .output-section {
            margin-top: 20px;
            padding: 15px;
            background: #f6f8fa;
            border-radius: 8px;
        }
        
        .output-section h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .output-section pre {
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-radius: 4px;
        }
        
        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }
            
            header {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .assignment-type-selector {
                flex-direction: column;
            }
            
            .method-buttons {
                flex-direction: column;
            }
            
            .file-details {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .remove-btn {
                align-self: flex-end;
            }
            
            .submit-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-laptop-code"></i>
                </div>
                <div>
                    <h1>进程管理评测系统</h1>
                    <div class="subtitle">OS Process Management Judge</div>
                </div>
            </div>
            <div style="margin-top: 12px;">
                <button class="editor-btn" onclick="logout()">返回登录</button>
            </div>
        </header>
        
        <main class="main-content">
            <!-- 控制面板 -->
            <div class="control-panel">
                <div class="panel-section">
                    <div class="section-title">
                        <i class="fas fa-tasks"></i>
                        作业类型
                    </div>
                    
                    <div class="assignment-type-selector">
                        <div class="type-option">
                            <input type="radio" id="type-normal" name="assignmentType" value="normal" 
                                   class="type-radio" checked onchange="updateAssignmentType()">
                            <label for="type-normal" class="type-label">
                                <div class="type-icon">
                                    <i class="fas fa-file-code"></i>
                                </div>
                                <div class="type-name">普通C程序</div>
                                <div class="type-desc">基础C语言评测</div>
                            </label>
                        </div>
                        
                        <div class="type-option">
                            <input type="radio" id="type-process" name="assignmentType" value="process" 
                                   class="type-radio" onchange="updateAssignmentType()">
                            <label for="type-process" class="type-label">
                                <div class="type-icon">
                                    <i class="fas fa-sitemap"></i>
                                </div>
                                <div class="type-name">进程管理</div>
                                <div class="type-desc">fork/wait/斐波那契/阶乘</div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="panel-section">
                    <div class="section-title">
                        <i class="fas fa-cog"></i>
                        评测设置
                    </div>
                    
                    <div class="setting-item">
                        <label for="timeout">
                            <i class="fas fa-clock"></i>
                            时间限制 (秒)
                        </label>
                        <input type="number" id="timeout" min="1" max="10" value="3">
                    </div>
                    
                    <div class="setting-item">
                        <label for="language">
                            <i class="fas fa-code"></i>
                            编程语言
                        </label>
                        <select id="language" disabled>
                            <option value="c">C语言</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 输入方式选择器 -->
            <div class="input-method-selector">
                <div class="section-title">
                    <i class="fas fa-keyboard"></i>
                    输入方式
                </div>
                
                <div class="method-buttons">
                    <button class="method-btn active" onclick="setInputMethod('text')">
                        <i class="fas fa-keyboard"></i> 直接输入
                    </button>
                    <button class="method-btn" onclick="setInputMethod('file')">
                        <i class="fas fa-upload"></i> 上传文件
                    </button>
                </div>
            </div>
            
            <!-- 代码编辑器 -->
            <div class="code-editor-section" id="textInputSection">
                <div class="section-title">
                    <i class="fas fa-keyboard"></i>
                    代码编辑器
                </div>
                
                <div class="code-editor">
                    <div class="editor-header">
                        <div id="currentTypeInfo">
                            <span id="currentTypeName">普通C程序</span>
                            <span id="currentTypeDesc" style="color: #666; margin-left: 10px; font-size: 0.9em;">
                                - 基础C语言评测
                            </span>
                        </div>
                        <div class="editor-actions">
                            <button class="editor-btn" onclick="loadTemplate()">
                                <i class="fas fa-file-code"></i>
                                加载模板
                            </button>
                            <button class="editor-btn" onclick="clearCode()">
                                <i class="fas fa-trash"></i>
                                清空
                            </button>
                        </div>
                    </div>
                    <textarea id="code" placeholder="请在此处输入代码..." spellcheck="false"></textarea>
                </div>
            </div>
            
            <!-- 文件上传区域 -->
            <div class="file-upload-section" id="fileInputSection" style="display: none;">
                <div class="section-title">
                    <i class="fas fa-upload"></i>
                    文件上传
                </div>
                
                <div class="upload-container" id="uploadArea">
                    <div class="upload-icon">
                        <i class="fas fa-file-upload"></i>
                    </div>
                    <div class="upload-text">
                        <h4>拖放文件到此处，或点击选择文件</h4>
                        <p>支持 .c, .cpp, .txt 文件，最大 1MB</p>
                    </div>
                    <input type="file" id="fileInput" accept=".c,.cpp,.txt" style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-folder-open"></i> 选择文件
                    </button>
                </div>
                
                <div class="file-info" id="fileInfo" style="display: none;">
                    <div class="file-details">
                        <div class="file-name" id="fileName"></div>
                        <div class="file-size" id="fileSize"></div>
                        <button class="remove-btn" onclick="clearFile()">
                            <i class="fas fa-times"></i> 移除
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 提交按钮 -->
            <div class="submit-section">
                <button class="submit-btn" onclick="submitCode()" id="submitBtn">
                    <i class="fas fa-play"></i>
                    开始评测
                </button>
            </div>
            
            <!-- 结果区域 -->
            <div class="result-section">
                <div class="section-title">
                    <i class="fas fa-chart-bar"></i>
                    评测结果
                </div>
                
                <div class="result-container">
                    <div class="result-header">
                        <div class="result-status">
                            <i class="fas fa-spinner loading-spinner" id="loadingSpinner" style="display: none;"></i>
                            <span id="resultStatus">等待评测...</span>
                        </div>
                        <div id="resultTime"></div>
                    </div>
                    <div class="result-content" id="resultContent">
                        评测结果将在这里显示
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 全局变量
        let currentAssignmentType = 'normal';
        let currentInputMethod = 'text';
        let uploadedFile = null;
        let fileContent = '';
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('code').focus();
            
            // 设置代码编辑器快捷键
            setupCodeEditor();
            
            // 初始化文件上传事件
            initFileUpload();
            
            // 加载模板
            setTimeout(() => {
                loadTemplate();
            }, 500);
        });
        
        // 更新作业类型
        function updateAssignmentType() {
            const type = document.querySelector('input[name="assignmentType"]:checked').value;
            currentAssignmentType = type;
            
            // 更新显示
            const typeName = document.getElementById('currentTypeName');
            const typeDesc = document.getElementById('currentTypeDesc');
            
            if (type === 'normal') {
                typeName.textContent = '普通C程序';
                typeDesc.textContent = '- 基础C语言评测';
            } else {
                typeName.textContent = '进程管理作业';
                typeDesc.textContent = '- fork/wait/斐波那契/阶乘';
            }
            
            // 加载对应模板
            loadTemplate();
        }
        
        // 设置输入方式
        function setInputMethod(method) {
            currentInputMethod = method;
            
            // 更新按钮状态
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 显示对应的输入区域
            if (method === 'text') {
                document.getElementById('textInputSection').style.display = 'block';
                document.getElementById('fileInputSection').style.display = 'none';
            } else {
                document.getElementById('textInputSection').style.display = 'none';
                document.getElementById('fileInputSection').style.display = 'block';
            }
        }
        
        // 加载模板
        async function loadTemplate() {
            try {
                const response = await fetch(`/api/template/${currentAssignmentType}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }
                
                const data = await response.json();
                document.getElementById('code').value = data.code.trim();
                
            } catch (error) {
                console.error('加载模板失败:', error);
                alert('加载模板失败，请检查后端服务');
                // 可以设置一个简单的默认值
                document.getElementById('code').value = 
                    currentAssignmentType === 'process' 
                    ? '// 进程管理作业模板加载失败，请手动输入代码\n#include <stdio.h>'
                    : '// 普通C程序模板加载失败,请手动输入代码\n#include <stdio.h>';
            }
        }
        
        // 清空代码
        function clearCode() {
            if (confirm('确定要清空代码吗？')) {
                document.getElementById('code').value = '';
            }
        }
        
        // 设置代码编辑器快捷键
        function setupCodeEditor() {
            const codeEditor = document.getElementById('code');
            
            codeEditor.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });
        }
        
        // 初始化文件上传
        function initFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const uploadArea = document.getElementById('uploadArea');
            
            // 点击选择文件
            fileInput.addEventListener('change', handleFileSelect);
            
            // 拖放功能
            uploadArea.addEventListener('dragover', handleDragOver);
            uploadArea.addEventListener('dragleave', handleDragLeave);
            uploadArea.addEventListener('drop', handleDrop);
        }
        
        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            processFile(file);
        }
        
        // 处理拖放
        function handleDragOver(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('uploadArea').classList.add('dragover');
        }
        
        function handleDragLeave(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('uploadArea').classList.remove('dragover');
        }
        
        function handleDrop(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('uploadArea').classList.remove('dragover');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }
        
        // 处理文件
        function processFile(file) {
            // 验证文件类型
            if (!isValidFileType(file.name)) {
                showError('只支持 .c, .cpp, .txt 文件');
                return;
            }
            
            // 验证文件大小（最大1MB）
            if (file.size > 1024 * 1024) {
                showError('文件太大，最大支持1MB');
                return;
            }
            
            uploadedFile = file;
            
            // 显示文件信息
            showFileInfo(file);
            
            // 读取文件内容
            const reader = new FileReader();
            reader.onload = function(e) {
                fileContent = e.target.result;
            };
            
            reader.onerror = function() {
                showError('读取文件失败，请重试');
                clearFile();
            };
            
            reader.readAsText(file, 'UTF-8');
        }
        
        // 验证文件类型
        function isValidFileType(filename) {
            const validExtensions = ['.c', '.cpp', '.txt'];
            const extension = filename.toLowerCase().substring(filename.lastIndexOf('.'));
            return validExtensions.includes(extension);
        }
        
        // 显示文件信息
        function showFileInfo(file) {
            const fileInfo = document.getElementById('fileInfo');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');
            
            // 获取文件类型图标
            const extension = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
            const typeIcon = getFileTypeIcon(extension);
            
            // 格式化文件大小
            const size = formatFileSize(file.size);
            
            fileName.innerHTML = `
                ${typeIcon} ${file.name}
                <span class="file-type-badge">${extension.toUpperCase()}</span>
            `;
            
            fileSize.textContent = size;
            fileInfo.style.display = 'block';
            
            // 隐藏错误信息
            hideError();
        }
        
        // 获取文件类型图标
        function getFileTypeIcon(extension) {
            const icons = {
                '.c': '<i class="fas fa-file-code"></i>',
                '.cpp': '<i class="fas fa-file-code"></i>',
                '.txt': '<i class="fas fa-file-alt"></i>'
            };
            return icons[extension] || '<i class="fas fa-file"></i>';
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 清除文件
        function clearFile() {
            uploadedFile = null;
            fileContent = '';
            
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            
            // 切换回文本输入
            setInputMethod('text');
            document.querySelector('.method-btn.active').classList.remove('active');
            document.querySelector('.method-btn[onclick*="text"]').classList.add('active');
            
            // 隐藏错误信息
            hideError();
        }
        
        // 显示错误
        function showError(message) {
            // 移除现有错误信息
            hideError();
            
            const uploadArea = document.getElementById('uploadArea');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `
                <i class="fas fa-exclamation-circle"></i>
                <span>${message}</span>
            `;
            
            uploadArea.parentNode.insertBefore(errorDiv, uploadArea.nextSibling);
            
            // 3秒后自动隐藏
            setTimeout(hideError, 3000);
        }
        
        // 隐藏错误
        function hideError() {
            const errorMsg = document.querySelector('.error-message');
            if (errorMsg) {
                errorMsg.remove();
            }
        }
        
        // 提交评测
        async function submitCode() {
            const timeout = parseInt(document.getElementById('timeout').value) || 3;
            const submitBtn = document.getElementById('submitBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const resultContent = document.getElementById('resultContent');
            const resultStatus = document.getElementById('resultStatus');
            const resultTime = document.getElementById('resultTime');
            
            // 获取代码内容
            let code = '';
            
            if (currentInputMethod === 'text') {
                code = document.getElementById('code').value.trim();
                if (!code) {
                    alert('请输入代码');
                    return;
                }
            } else { // file
                if (!uploadedFile || !fileContent) {
                    alert('请先选择C文件');
                    return;
                }
                code = fileContent;
            }
            
            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 评测中...';
            loadingSpinner.style.display = 'inline-block';
            
            // 显示评测状态
            resultStatus.innerHTML = '<span class="status-se">评测中...</span>';
            resultTime.textContent = '';
            resultContent.textContent = '正在评测，请稍候...';
            
            try {
                const startTime = Date.now();
                
                const response = await fetch("/api/judge", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        code: code,
                        timeout: timeout,
                        assignment_type: currentAssignmentType
                    })
                });
                
                const endTime = Date.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // 更新结果
                updateResult(data, duration);
                
            } catch (error) {
                resultStatus.innerHTML = '<span class="status-badge se">系统错误</span>';
                resultContent.innerHTML = `
                    <div style="color: #f5222d;">
                        <i class="fas fa-exclamation-circle"></i> 请求失败
                    </div>
                    <div style="margin-top: 10px;">
                        <strong>错误信息:</strong> ${error.message}
                    </div>
                `;
                console.error("评测错误:", error);
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-play"></i> 开始评测';
                loadingSpinner.style.display = 'none';
            }
        }
        
        // 更新结果显示
        function updateResult(data, duration) {
            const resultStatus = document.getElementById('resultStatus');
            const resultTime = document.getElementById('resultTime');
            const resultContent = document.getElementById('resultContent');
            
            // 设置时间
            resultTime.textContent = `用时: ${duration}s`;
            
            // 状态映射
            const statusMap = {
                'AC': { text: '通过', class: 'status-ac', icon: '✅' },
                'PA': { text: '部分通过', class: 'status-pa', icon: '⚠️' },
                'WA': { text: '答案错误', class: 'status-wa', icon: '❌' },
                'CE': { text: '编译错误', class: 'status-ce', icon: '🔧' },
                'TLE': { text: '时间超限', class: 'status-tle', icon: '⏰' },
                'RE': { text: '运行时错误', class: 'status-re', icon: '💥' },
                'SE': { text: '系统错误', class: 'status-se', icon: '🚨' }
            };
            
            const status = statusMap[data.status] || statusMap.SE;
            
            // 更新状态显示
            resultStatus.innerHTML = `
                <span class="status-badge ${status.class}">
                    ${status.icon} ${status.text}
                </span>
            `;
            
            // 构建结果内容
            let html = `
                <div style="margin-bottom: 20px;">
                    <div style="font-size: 1.2em; font-weight: 600; margin-bottom: 10px; color: #333;">
                        ${status.icon} ${status.text}
                    </div>
                    <div>${data.message || ''}</div>
                </div>
                
                <div class="score-display">
                    <span class="score-value">${data.score || 0}</span>
                    <span class="max-score">/${data.max_score || 100}</span>
                </div>
            `;
            
            // 显示测试结果（进程作业）
            if (currentAssignmentType === 'process' && data.test_results) {
                html += `
                    <div class="test-results">
                        <h4 style="margin-bottom: 15px; color: #333;">
                            <i class="fas fa-vial"></i> 测试点详情
                        </h4>
                `;
                
                data.test_results.forEach(test => {
                    const testClass = test.passed ? 'passed' : 'failed';
                    const statusIcon = test.passed ? '✅' : '❌';
                    
                    html += `
                        <div class="test-result-item ${testClass}">
                            <div class="test-header">
                                <div class="test-name">${test.name}</div>
                                <div class="test-score">${test.score}分</div>
                            </div>
                            <div class="test-message">${statusIcon} ${test.message}</div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // 显示输出
            if (data.output) {
                html += `
                    <div class="output-section">
                        <h4><i class="fas fa-terminal"></i> 程序输出</h4>
                        <pre>${escapeHtml(data.output)}</pre>
                    </div>
                `;
            }
            
            resultContent.innerHTML = html;
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function logout() {
            sessionStorage.removeItem("os_judge_session_v1");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
